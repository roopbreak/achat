<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AChat</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="chat-wrap">
    <header id="chat-header">
      <a href="/" style="color:var(--text-dim);font-size:20px;line-height:1;">←</a>
      <span class="story-title" id="story-title">로딩 중...</span>
      <div class="session-actions">
        <button class="btn btn-secondary" onclick="openSlots()" style="font-size:13px;padding:6px 12px;">
          <span>💾</span><span>슬롯</span>
        </button>
        <button class="btn btn-secondary" onclick="toggleNotePanel()" style="font-size:13px;padding:6px 12px;" title="유저 노트">📝</button>
        <button class="btn btn-secondary" onclick="toggleSettings()" style="font-size:13px;padding:6px 12px;" title="설정">⚙️</button>
        <button class="btn btn-secondary" onclick="resetSession()" style="font-size:13px;padding:6px 12px;">
          <span>🔄</span><span>초기화</span>
        </button>
        <button class="btn btn-secondary" onclick="exportChat()" style="font-size:13px;padding:6px 12px;" title="내보내기">
          <span>📥</span><span>내보내기</span>
        </button>
        <a href="/history.html" class="btn btn-secondary" style="font-size:13px;padding:6px 12px;">
          <span>📖</span><span>히스토리</span>
        </a>
      </div>
    </header>

    <div id="chat-messages"></div>

    <!-- 유저 노트 패널 (숨김) -->
    <div id="note-panel" style="display:none;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:13px;color:var(--text-dim);">유저 노트 (시스템 프롬프트에 최우선 주입)</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-primary" onclick="saveNoteFromChat()" style="font-size:12px;padding:4px 12px;">저장</button>
          <button class="btn btn-secondary" onclick="toggleNotePanel()" style="font-size:12px;padding:4px 10px;">닫기</button>
        </div>
      </div>
      <textarea id="chat-note" rows="5" placeholder="진행 상태, 규칙, 중요 사건 등..." style="font-size:13px;"></textarea>
    </div>

    <!-- 설정 패널 (숨김) -->
    <div id="settings-panel" style="display:none;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0;flex-wrap:wrap;gap:16px;align-items:center;">
      <span style="font-size:13px;color:var(--text-dim);">글자 크기</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="btn btn-secondary" onclick="changeFontSize(-1)" style="font-size:12px;padding:4px 10px;">A-</button>
        <span id="font-size-label" style="font-size:13px;min-width:32px;text-align:center;"></span>
        <button class="btn btn-secondary" onclick="changeFontSize(1)"  style="font-size:12px;padding:4px 10px;">A+</button>
      </div>
      <span style="font-size:13px;color:var(--text-dim);margin-left:8px;">출력량</span>
      <select id="max-tokens-select" onchange="saveMaxTokens()" style="width:auto;font-size:13px;padding:5px 10px;">
        <option value="1024">짧게 (1K)</option>
        <option value="2048">보통 (2K)</option>
        <option value="4096" selected>길게 (4K)</option>
        <option value="8192">매우 길게 (8K)</option>
      </select>
      <span style="font-size:13px;color:var(--text-dim);margin-left:8px;">모델</span>
      <select id="model-select" onchange="saveModel()" style="width:auto;font-size:13px;padding:5px 10px;">
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>
      <button class="btn btn-secondary" onclick="toggleSettings()" style="font-size:12px;padding:4px 10px;margin-left:auto;">닫기</button>
    </div>

    <!-- 슬롯 패널 (숨김) -->
    <div id="slot-panel" style="display:none;">
      <span style="color:var(--text-dim);">슬롯:</span>
      <input id="slot-name" placeholder="슬롯 이름" style="width:140px;height:32px;font-size:13px;">
      <button class="btn btn-secondary" onclick="saveSlot()" style="font-size:12px;padding:5px 10px;">저장</button>
      <div id="slot-list" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      <button class="btn btn-secondary" onclick="document.getElementById('slot-panel').style.display='none'" style="font-size:12px;padding:5px 10px;margin-left:auto;">닫기</button>
    </div>

    <div id="token-bar" style="display:none;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:4px 16px;font-size:11px;color:var(--text-dim);font-family:monospace;"></div>

    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="메시지 입력... (~행동~ / 대사 / ~~ / ~~~)" rows="1"></textarea>
      <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">전송</button>
    </div>
  </div>

  <div id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img"></div>
  <script src="/chat.js"></script>
</body>
</html>
