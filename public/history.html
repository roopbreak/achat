<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AChat — 히스토리</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <nav class="nav">
    <span class="logo"><a href="/" style="color:inherit;text-decoration:none;">AChat</a></span>
    <div class="nav-links">
      <a href="/history.html" style="color:var(--accent);">히스토리</a>
      <a href="/admin.html">관리</a>
    </div>
  </nav>
  <div class="page" style="display:flex;gap:20px;align-items:flex-start;">
    <!-- 스토리 + 세션 목록 -->
    <div style="width:260px;flex-shrink:0;">
      <h3 style="font-size:15px;margin-bottom:12px;">스토리</h3>
      <div id="story-list"></div>
    </div>

    <!-- 메시지 뷰어 -->
    <div style="flex:1;min-width:0;">
      <div id="session-header" style="display:none;margin-bottom:16px;">
        <h3 id="session-title" style="font-size:15px;"></h3>
        <div id="session-meta" style="font-size:13px;color:var(--text-dim);margin-top:4px;"></div>
      </div>
      <div id="msg-viewer" style="display:flex;flex-direction:column;gap:12px;"></div>
      <div id="empty-state" style="color:var(--text-dim);font-size:14px;padding:40px 0 0;">
        왼쪽에서 스토리와 세션을 선택하세요.
      </div>
    </div>
  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    let selectedStory = null;

    async function loadStories() {
      const res  = await fetch('/api/stories');
      const list = await res.json();
      const div  = document.getElementById('story-list');
      div.innerHTML = list.map(s => `
        <div class="session-item" onclick="selectStory('${s.name}', this)">
          <div class="title">${s.char_name}</div>
          <div class="meta">${s.name}</div>
        </div>
      `).join('') || '<div style="color:var(--text-dim);font-size:13px;">스토리 없음</div>';
    }

    async function selectStory(name, el) {
      document.querySelectorAll('#story-list .session-item').forEach(e => e.style.borderColor = '');
      el.style.borderColor = 'var(--accent)';
      selectedStory = name;

      const res  = await fetch(`/api/stories/${encodeURIComponent(name)}/sessions`);
      const list = await res.json();

      const div = document.getElementById('story-list');
      // 세션 목록을 스토리 아이템 아래에 추가
      const existing = div.querySelector('.session-sub');
      if (existing) existing.remove();

      const sub = document.createElement('div');
      sub.className = 'session-sub';
      sub.style.marginTop = '8px';
      sub.innerHTML = list.map(s => `
        <div class="session-item" style="margin-bottom:6px;padding:10px 14px;" onclick="loadSession('${s.id}','${name}',${s.turn_count})">
          <div class="title" style="font-size:13px;">${s.title ?? '세션 ' + s.id.slice(0,8)}</div>
          <div class="meta">${s.turn_count}턴 · ${new Date(s.created_at*1000).toLocaleDateString('ko')}</div>
        </div>
      `).join('') || '<div style="color:var(--text-dim);font-size:12px;padding:6px 14px;">세션 없음</div>';
      div.appendChild(sub);
    }

    async function loadSession(sessionId, storyName, turnCount) {
      document.getElementById('session-header').style.display = 'block';
      document.getElementById('session-title').textContent = `${storyName} — 세션`;
      document.getElementById('session-meta').textContent = `${turnCount}턴`;
      document.getElementById('empty-state').style.display = 'none';

      const res  = await fetch(`/api/sessions/${sessionId}/messages?limit=99999`);
      const data = await res.json();
      const msgs = data.messages ?? (Array.isArray(data) ? data : []);

      const viewer = document.getElementById('msg-viewer');
      viewer.innerHTML = msgs.map(m => `
        <div class="history-msg">
          <div class="role">${m.role === 'user' ? '유저' : '서술자'}</div>
          <div>${m.role === 'user' ? `<pre style="white-space:pre-wrap;font-family:inherit;font-size:14px;">${m.content}</pre>` : marked.parse(m.content)}</div>
        </div>
      `).join('');
      viewer.scrollTop = 0;
    }

    loadStories();
  </script>
</body>
</html>
