<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AChat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="nav">
    <span class="logo">AChat</span>
    <div class="nav-links">
      <a href="/history.html">히스토리</a>
      <a href="/admin.html">관리</a>
    </div>
  </nav>
  <div class="page">

    <!-- 최근 진행 -->
    <div id="recent-section" style="display:none;margin-bottom:32px;">
      <h2 style="margin-bottom:12px;font-size:16px;color:var(--text-dim);">최근 진행</h2>
      <div class="story-grid" id="recent-grid"></div>
    </div>

    <!-- 전체 스토리 -->
    <h2 style="margin-bottom:8px;font-size:16px;color:var(--text-dim);">전체 스토리</h2>
    <div class="story-grid" id="story-grid">
      <div style="color:var(--text-dim);font-size:14px;padding:20px 0;">불러오는 중...</div>
    </div>
  </div>

  <script>
    async function load() {
      const [storiesRes, recentRes] = await Promise.all([
        fetch('/api/stories'),
        fetch('/api/stories/recent'),
      ]);
      const list   = await storiesRes.json();
      const recent = await recentRes.json();

      // 최근 진행
      if (recent.length) {
        document.getElementById('recent-section').style.display = 'block';
        document.getElementById('recent-grid').innerHTML = recent.map(s => `
          <div class="story-card" style="position:relative;">
            <div onclick="location.href='/chat.html?story=${encodeURIComponent(s.name)}'">
              <h3>${s.name}</h3>
              <div class="char" style="display:flex;justify-content:space-between;align-items:center;">
                <span>${s.char_name}</span>
                <span style="font-size:11px;color:var(--text-dim);">${timeAgo(s.updated_at)}</span>
              </div>
            </div>
            <button onclick="event.stopPropagation();clearRecent(decodeURIComponent('${encodeURIComponent(s.name)}'))"
              style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px;" title="세션 삭제">✕</button>
          </div>
        `).join('');
      }

      // 전체 목록
      const grid = document.getElementById('story-grid');
      if (!list.length) {
        grid.innerHTML = '<div style="color:var(--text-dim);font-size:14px;padding:20px 0;">스토리가 없습니다. <a href="/admin.html">관리 페이지</a>에서 임포트하세요.</div>';
        return;
      }
      grid.innerHTML = list.map(s => `
        <div class="story-card" onclick="location.href='/chat.html?story=${encodeURIComponent(s.name)}'">
          <h3>${s.name}</h3>
          <div class="desc">${s.summary ?? ''}</div>
        </div>
      `).join('');
    }

    async function clearRecent(storyName) {
      if (!confirm(`"${storyName}" 의 모든 채팅 기록을 삭제할까요?`)) return;
      await fetch(`/api/stories/${encodeURIComponent(storyName)}/sessions`, { method: 'DELETE' });
      sessionStorage.removeItem(`session_${storyName}`);
      load();
    }

    function timeAgo(unixSec) {
      const diff = Math.floor(Date.now() / 1000) - unixSec;
      if (diff < 60)   return '방금';
      if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
      return `${Math.floor(diff/86400)}일 전`;
    }

    load();
  </script>
</body>
</html>
